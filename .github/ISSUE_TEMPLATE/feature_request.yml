name: Feature Request
description: 提议一个新功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议!

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你遇到了什么问题或限制?
      placeholder: 我希望能够... 但目前无法...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望功能
      description: 你希望添加什么功能?
      placeholder: 详细描述你期望的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 这个功能会如何帮助你?
      placeholder: |
        1. 我经常需要...
        2. 这个功能可以帮助我...
        3. 例如...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他解决方案吗?
      placeholder: 我尝试过... 但...

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 其他可能有帮助的信息,如截图、链接等
