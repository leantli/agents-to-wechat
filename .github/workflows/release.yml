name: Release to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: node scripts/verify-release-tag.mjs "$GITHUB_REF_NAME"

      - name: Run release preflight
        run: npm run release:preflight

      - name: Extract GitHub Release body from changelog
        run: node scripts/extract-changelog-entry.mjs "$GITHUB_REF_NAME" > release-body.md

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-body.md
